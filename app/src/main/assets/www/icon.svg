<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#09070f"/>
    </linearGradient>
    
    <!-- Neon Pulse Gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded Squircle Base for Mobile Icons -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" stroke="#2d1c5c" stroke-width="6"/>

  <!-- Subtle grid lines in background -->
  <path d="M 24 128 L 488 128 M 24 256 L 488 256 M 24 384 L 488 384 M 128 24 L 128 488 M 256 24 L 256 488 M 384 24 L 384 488" 
        stroke="#ffffff" stroke-opacity="0.03" stroke-width="2"/>

  <!-- Decorative Outer Glow Ring -->
  <rect x="48" y="48" width="416" height="416" rx="88" fill="none" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Glowing Pulse Wave in Background -->
  <path d="M 96 300 Q 146 300 176 210 T 256 280 T 336 120 T 416 300" 
        fill="none" stroke="url(#pulseGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" 
        filter="url(#neonGlow)" opacity="0.85"/>

  <!-- Stylized Credit Card / Wallet Core -->
  <g transform="translate(196, 216)" filter="url(#neonGlow)">
    <!-- Main Card Body with Glassy Border -->
    <rect x="-10" y="-10" width="140" height="90" rx="16" fill="#0f0c24" fill-opacity="0.75" stroke="#ec4899" stroke-width="3"/>
    
    <!-- Gold Smart Chip -->
    <rect x="12" y="10" width="24" height="18" rx="4" fill="#f59e0b"/>
    <path d="M 20 10 L 20 28 M 28 10 L 28 28 M 12 19 L 36 19" stroke="#78350f" stroke-width="1.5"/>
    
    <!-- Card Accent Brand Line -->
    <line x1="12" y1="45" x2="62" y2="45" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round"/>
    <line x1="12" y1="58" x2="42" y2="58" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Wireless Pay Signal -->
    <path d="M 105 15 A 15 15 0 0 1 105 45 M 113 8 A 25 25 0 0 1 113 52" 
          fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Glowing Dot reflecting transaction success -->
  <circle cx="340" cy="275" r="10" fill="#10b981" filter="url(#neonGlow)"/>
</svg>
